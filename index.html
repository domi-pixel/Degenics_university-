<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Safety guard for 'ethereum' property redefinition errors
      // This prevents conflicts between browser extensions and the preview environment
      try {
        if (!window.ethereum) {
          Object.defineProperty(window, 'ethereum', {
            value: undefined,
            writable: true,
            configurable: true
          });
        }
      } catch (e) {
        // Silent fail to ensure app continues loading
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
